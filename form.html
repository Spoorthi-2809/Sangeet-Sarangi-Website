<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Sangeet Sarangi</title>

<!-- FAVICON -->

<link rel="icon" type="image/png" href="images/logo.png">

<!-- FONT AWESOME -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- GOOGLE FONTS -->

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* BODY */

body{

    margin:0;

    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.82),
    rgba(0,0,0,0.92)),
    url('images/logo.png');

    background-size:cover;
    background-position:center;

    font-family:'Poppins',sans-serif;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px 20px;

    overflow-x:hidden;
}

/* FORM CONTAINER */

.form-container{

    width:100%;
    max-width:800px;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:35px;

    padding:50px;

    backdrop-filter:blur(18px);

    box-shadow:
    0 25px 60px rgba(0,0,0,0.55),
    0 0 35px rgba(242,197,114,0.12);

    position:relative;

    overflow:hidden;
}

/* TOP GLOW */

.form-container::before{

    content:'';

    position:absolute;

    width:350px;
    height:350px;

    background:
    radial-gradient(circle,
    rgba(242,197,114,0.18),
    transparent 70%);

    top:-120px;
    right:-120px;
}

/* HEADING */

.form-container h2{

    text-align:center;

    color:#f2c572;

    margin-bottom:15px;

    font-size:2.8rem;

    font-family:'Cinzel',serif;

    position:relative;
    z-index:2;
}

/* SUBTITLE */

.form-subtitle{

    text-align:center;

    color:#d8d8d8;

    margin-bottom:20px;

    line-height:1.8;

    position:relative;
    z-index:2;
}

/* MUSIC ICON */

.music-divider{

    text-align:center;

    margin-bottom:35px;

    color:#f2c572;

    font-size:1.5rem;

    opacity:0.9;

    position:relative;
    z-index:2;
}

/* FORM GRID */

.form-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:25px;

    position:relative;
    z-index:2;
}

/* FORM GROUP */

.form-group{

    display:flex;

    flex-direction:column;
}

/* LABEL */

.form-group label{

    margin-bottom:10px;

    color:#f2c572;

    font-size:0.95rem;

    font-weight:500;
}

/* INPUT BOX */

.input-box{

    position:relative;
}

/* ICON */

.input-box i{

    position:absolute;

    left:16px;
    top:50%;

    transform:translateY(-50%);

    color:#f2c572;

    font-size:1rem;
}

/* INPUTS */

.form-group input,
.form-group select{

    width:100%;

    padding:
    15px 18px 15px 48px;

    border:none;

    outline:none;

    border-radius:16px;

    background:
    rgba(255,255,255,0.06);

    color:white;

    font-size:1rem;

    border:
    1px solid rgba(255,255,255,0.08);

    transition:0.3s ease;

    box-sizing:border-box;
}

/* FOCUS */

.form-group input:focus,
.form-group select:focus{

    border-color:#f2c572;

    box-shadow:
    0 0 18px rgba(242,197,114,0.25);
}

/* SELECT OPTION */

select option{

    background:#121212;
}

/* BUTTON */

.submit-btn{

    width:100%;

    margin-top:35px;

    padding:17px;

    border:none;

    border-radius:60px;

    background:
    linear-gradient(135deg,#f2c572,#d6a848);

    color:black;

    font-size:1rem;

    font-weight:700;

    cursor:pointer;

    transition:0.4s ease;

    display:flex;
    justify-content:center;
    align-items:center;

    gap:12px;

    position:relative;
    z-index:2;
}

/* BUTTON HOVER */

.submit-btn:hover{

    transform:
    translateY(-5px)
    scale(1.01);

    box-shadow:
    0 18px 35px rgba(242,197,114,0.35);
}

/* MOBILE */

@media(max-width:768px){

    .form-container{

        padding:35px 25px;
    }

    .form-container h2{

        font-size:2rem;
    }

    .form-grid{

        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<div class="form-container">

<h2>Student Registration</h2>

<p class="form-subtitle">

Begin your musical journey with
Sangeet Sarangi Keyboard Classes 🎹

</p>

<div class="music-divider">

<i class="fas fa-music"></i>

</div>

<!-- FORM -->

<form
action="https://formsubmit.co/spoorthi.udyavar@gmail.com"
method="POST"
>

<!-- DISABLE CAPTCHA -->

<input type="hidden" name="_captcha" value="false">

<!-- SUCCESS PAGE REDIRECT -->

<input
type="hidden"
name="_next"
value="https://sangeetsarangi.vercel.app/success/">

<div class="form-grid">

<!-- NAME -->

<div class="form-group">

<label>Student Name</label>

<div class="input-box">

<i class="fas fa-user"></i>

<input
type="text"
name="Student Name"
required
minlength="3"
pattern="[A-Za-z ]+"
placeholder="Enter Full Name">

</div>

</div>

<!-- AGE -->

<div class="form-group">

<label>Age</label>

<div class="input-box">

<i class="fas fa-child"></i>

<input
type="number"
name="Age"
required
min="4"
max="80"
placeholder="Enter Age">

</div>

</div>

<!-- PLACE -->

<div class="form-group">

<label>Place</label>

<div class="input-box">

<i class="fas fa-location-dot"></i>

<input
type="text"
name="Place"
required
placeholder="Enter Your Place">

</div>

</div>

<!-- EMAIL -->

<div class="form-group">

<label>Email Address</label>

<div class="input-box">

<i class="fas fa-envelope"></i>

<input
type="email"
name="Email"
required
placeholder="example@gmail.com">

</div>

</div>

<!-- PHONE -->

<div class="form-group">

<label>Phone Number</label>

<div class="input-box">

<i class="fas fa-phone"></i>

<input
type="tel"
name="Phone Number"
required
maxlength="10"
pattern="[0-9]{10}"
placeholder="10 Digit Number">

</div>

</div>

<!-- BATCH -->

<div class="form-group">

<label>Preferred Batch</label>

<div class="input-box">

<i class="fas fa-clock"></i>

<select name="Preferred Batch" required>

<option value="">Select Batch</option>

<option>Mon - Wed - Offline - [8PM - 9PM]</option>

<option>Mon - Wed - Offline - [9PM - 10PM]</option>

<option>Tue - Thu - Offline - [8PM - 9PM]</option>

<option>Tue - Thu - Offline - [9PM - 10PM]</option>

<option>Sat - Sun - Offline - [8PM - 9PM]</option>

<option>Sat - Sun - Offline - [9PM - 10PM]</option>

<option>Sat - Sun - Online - [10AM - 11AM]</option>

<option>Sat - Sun - Online - [11AM - 12PM]</option>

</select>

</div>

</div>

</div>

<!-- SUBMIT BUTTON -->

<button type="submit" class="submit-btn">

<i class="fas fa-paper-plane"></i>

Submit Registration

</button>

</form>

</div>

</body>
</html>
