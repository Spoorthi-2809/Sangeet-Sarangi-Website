<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Registration Successful</title>

<!-- Favicon -->

<link rel="icon"
type="image/png"
href="../images/logo.png">

<!-- Main CSS -->

<link rel="stylesheet"
href="../css/style.css">

<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- Google Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

/* BODY */

body{

    margin:0;
    padding:0;

    min-height:100vh;

    display:flex;

    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #050505,
    #0f0f0f,
    #151515
    );

    font-family:'Poppins',sans-serif;

    overflow:hidden;

    color:white;

    position:relative;
}

/* PARTICLES */

#particles-js{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    z-index:-1;
}

/* SUCCESS BOX */

.success-box{

    width:90%;
    max-width:680px;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:35px;

    padding:55px 40px;

    text-align:center;

    backdrop-filter:blur(18px);

    box-shadow:
    0 25px 60px rgba(0,0,0,0.55),
    0 0 35px rgba(242,197,114,0.12);

    animation:fadeIn 1s ease;

    position:relative;

    overflow:hidden;
}

/* TOP GLOW */

.success-box::before{

    content:'';

    position:absolute;

    width:350px;
    height:350px;

    background:
    radial-gradient(circle,
    rgba(242,197,114,0.18),
    transparent 70%);

    top:-120px;
    right:-120px;
}

/* ICON */

.success-icon{

    width:120px;
    height:120px;

    margin:auto auto 30px;

    border-radius:50%;

    background:
    linear-gradient(
    135deg,
    #f2c572,
    #d6a848
    );

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:3rem;

    color:black;

    box-shadow:
    0 15px 35px rgba(242,197,114,0.35);

    animation:pulse 2s infinite;

    position:relative;
    z-index:2;
}

/* TITLE */

.success-box h1{

    color:#f2c572;

    font-size:2.7rem;

    margin-bottom:20px;

    font-family:'Cinzel',serif;

    position:relative;
    z-index:2;
}

/* MESSAGE */

.success-box p{

    color:#d8d8d8;

    font-size:1.05rem;

    line-height:1.9;

    margin-bottom:40px;

    position:relative;
    z-index:2;
}

/* BUTTON */

.home-btn{

    display:inline-flex;

    align-items:center;

    gap:12px;

    text-decoration:none;

    padding:16px 38px;

    border-radius:60px;

    background:
    linear-gradient(
    135deg,
    #f2c572,
    #d6a848
    );

    color:black;

    font-weight:700;

    transition:0.4s ease;

    box-shadow:
    0 10px 25px rgba(242,197,114,0.25);

    position:relative;
    z-index:2;
}

/* BUTTON HOVER */

.home-btn:hover{

    transform:
    translateY(-5px)
    scale(1.03);

    box-shadow:
    0 18px 35px rgba(242,197,114,0.45);
}

/* ANIMATIONS */

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(30px);
    }

    to{

        opacity:1;

        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:768px){

    .success-box{

        padding:45px 25px;
    }

    .success-box h1{

        font-size:2rem;
    }

    .success-box p{

        font-size:1rem;
    }

    .success-icon{

        width:100px;
        height:100px;

        font-size:2.4rem;
    }
}

</style>

</head>

<body>

<!-- PARTICLES -->

<div id="particles-js"></div>

<!-- SUCCESS CONTENT -->

<div class="success-box">

<!-- ICON -->

<div class="success-icon">

<i class="fas fa-music"></i>

</div>

<!-- TITLE -->

<h1>

Registration Successful

</h1>

<!-- MESSAGE -->

<p>

Thank you for registering with
<b>Sangeet Sarangi Keyboard Classes</b> 🎹

<br><br>

Your details have been submitted successfully.

We will contact you shortly regarding
batch confirmation and class details.

</p>

<!-- BUTTON -->

<a href="../index.html"
class="home-btn">

<i class="fas fa-house"></i>

Back To Home

</a>

</div>

<!-- PARTICLES JS -->

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js", {

  particles: {

    number: {
        value: 50
    },

    color: {
        value: "#f2c572"
    },

    shape: {
        type: "circle"
    },

    opacity: {
        value: 0.3
    },

    size: {
        value: 3
    },

    move: {
        enable: true,
        speed: 1.5
    }

  }

});

</script>

</body>
</html>
